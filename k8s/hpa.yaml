apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-jmv-hpa
  labels:
    app: api-jmv
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-jmv
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
      selectPolicy: Max
