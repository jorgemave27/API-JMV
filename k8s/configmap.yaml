apiVersion: v1
kind: ConfigMap
metadata:
  name: api-jmv-config
  labels:
    app: api-jmv
data:
  # ==============================
  # Config no sensible
  # ==============================
  APP_NAME: "API JMV"
  APP_ENV: "production"
  VERSION: "1.0.0"
  LOG_LEVEL: "INFO"
  MAX_ITEMS_PER_PAGE: "100"

  # ==============================
  # JWT / Auth
  # ==============================
  JWT_ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "15"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"

  # ==============================
  # CORS
  # ==============================
  CORS_ALLOW_ORIGINS: "https://mi-app.com"

  # ==============================
  # Redis / Cache
  # ==============================
  CACHE_ENABLED: "true"
  CACHE_TTL_ITEM_SECONDS: "300"
  CACHE_TTL_LIST_SECONDS: "300"

  # ==============================
  # Celery
  # ==============================
  CELERY_ENABLED: "true"

  # ==============================
  # Kafka
  # ==============================
  KAFKA_ENABLED: "true"
  KAFKA_CLIENT_ID: "api-jmv"
  KAFKA_EVENTS_TOPIC: "jmv.domain-events"

  # ==============================
  # Consul
  # ==============================
  CONSUL_ENABLED: "false"
  CONSUL_PORT: "8500"
  SERVICE_NAME: "api-jmv"
  SERVICE_HOST: "api-jmv-service"
  SERVICE_PORT: "8000"
  SERVICE_TAGS: "api,fastapi,jmv"

  # ==============================
  # Resilience
  # ==============================
  EXTERNAL_HTTP_TIMEOUT_SECONDS: "3"
  EXTERNAL_CACHE_TTL_SECONDS: "300"
  RESILIENCE_MOCK_BASE_URL: "http://api-jmv-service/api/v1/admin/resilience/mock-external"

  # ==============================
  # Profiling / Performance
  # ==============================
  PROFILING_ENABLED: "true"
  PROFILING_SLOW_REQUEST_THRESHOLD_MS: "500.0"
  PROFILING_CONSECUTIVE_SLOW_REQUESTS: "3"
  PROFILING_OUTPUT_DIR: "profiles"

  # ==============================
  # Observabilidad
  # ==============================
  PROMETHEUS_ENABLED: "true"

  # ==============================
  # Vault / KMS / Sentry / Logstash
  # ==============================
  VAULT_ADDR: "http://vault:8200"
  VAULT_TOKEN: "root"
  KMS_PROVIDER: "local"
  CONSUL_HOST: "consul"
  LOGSTASH_HOST: "logstash"
  LOGSTASH_PORT: "5044"
