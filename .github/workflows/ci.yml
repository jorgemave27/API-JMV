name: API-JMV CI/CD PIPELINE

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/api-jmv

jobs:
  # =========================
  # TEST UNITARIOS
  # =========================
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q

  # =========================
  # BUILD DOCKER IMAGE
  # =========================
  build:
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # =========================
  # INTEGRATION TESTS
  # =========================
  test-integration:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Pull latest image
        run: |
          docker pull ghcr.io/jorgemave27/api-jmv:latest

      - name: Run docker-compose
        run: |
          docker-compose -f docker-compose.yml up -d

      - name: Wait API
        run: |
          sleep 10

      - name: Smoke test basic endpoints
        run: |
          curl --fail http://localhost:8000/health
          curl --fail http://localhost:8000/api/v1/health

  # =========================
  # DEPLOY STAGING
  # =========================
  deploy-staging:
    runs-on: ubuntu-latest
    needs: test-integration

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy image to staging
        run: |
          kubectl set image deployment/api-jmv api=ghcr.io/${{ github.repository }}:latest

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-jmv

      - name: Run smoke tests
        run: |
          bash scripts/smoke_test.sh

  # =========================
  # DEPLOY PRODUCCIÓN
  # =========================
  deploy-production:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: production

    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Set Kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG_PROD }}" > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: Deploy to production
        run: |
          kubectl set image deployment/api-jmv api=ghcr.io/${{ github.repository }}:latest

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-jmv

      - name: Health check
        run: |
          bash scripts/health_check.sh || exit 1

      - name: Rollback if failed
        if: failure()
        run: |
          kubectl rollout undo deployment/api-jmv
