version: "3.9"

services:
  # =====================================================
  # API PRINCIPAL
  # =====================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-jmv-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      REDIS_URL: redis://redis:6379/0

      # -----------------------------------------------------
      # Celery
      # -----------------------------------------------------
      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

      # -----------------------------------------------------
      # Kafka
      # -----------------------------------------------------
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: api-jmv
      KAFKA_EVENTS_TOPIC: jmv.domain-events

      # -----------------------------------------------------
      # Consul
      # -----------------------------------------------------
      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      SERVICE_NAME: api-jmv
      SERVICE_HOST: api-jmv-api
      SERVICE_PORT: 8000
      SERVICE_TAGS: api,fastapi,jmv

      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

      EXTERNAL_HTTP_TIMEOUT_SECONDS: 3
      EXTERNAL_CACHE_TTL_SECONDS: 300
      RESILIENCE_MOCK_BASE_URL: http://api:8000/api/v1/admin/resilience/mock-external

      # -----------------------------------------------------
      # Vault
      # -----------------------------------------------------
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

      # -----------------------------------------------------
      # ELK LOGGING
      # -----------------------------------------------------
      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
      LOG_LEVEL: INFO

      # -----------------------------------------------------
      # Observabilidad
      # -----------------------------------------------------
      PROMETHEUS_ENABLED: "true"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_started
      vault:
        condition: service_started
      logstash:
        condition: service_started

    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # PROJECTION CONSUMER CQRS
  # =====================================================
  projection-consumer:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-jmv-projection-consumer
    command: python -m app.consumers.items_projection_consumer
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: api-jmv-projection-consumer
      KAFKA_EVENTS_TOPIC: jmv.domain-events

      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      EXTERNAL_HTTP_TIMEOUT_SECONDS: 3
      EXTERNAL_CACHE_TTL_SECONDS: 300
      RESILIENCE_MOCK_BASE_URL: http://api:8000/api/v1/admin/resilience/mock-external

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
      LOG_LEVEL: INFO
      SERVICE_NAME: api-jmv-projection-consumer

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      vault:
        condition: service_started
      logstash:
        condition: service_started

    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # CELERY WORKER
  # =====================================================
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-jmv-celery-worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
      LOG_LEVEL: INFO
      SERVICE_NAME: api-jmv-celery-worker

    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_started
      logstash:
        condition: service_started

    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # CELERY BEAT
  # =====================================================
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: api-jmv-celery-beat
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

      LOGSTASH_HOST: logstash
      LOGSTASH_PORT: 5044
      LOG_LEVEL: INFO
      SERVICE_NAME: api-jmv-celery-beat

    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_started
      logstash:
        condition: service_started

    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # POSTGRES
  # =====================================================
  db:
    image: postgres:15
    container_name: api-jmv-db
    environment:
      POSTGRES_DB: api_jmv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_jmv"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # REDIS
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: api-jmv-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # GATEWAY (NGINX)
  # =====================================================
  gateway:
    image: nginx:alpine
    container_name: api-jmv-gateway
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # RABBITMQ
  # =====================================================
  rabbitmq:
    image: rabbitmq:3-management
    container_name: api-jmv-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # KAFKA
  # =====================================================
  kafka:
    image: apache/kafka:3.9.2
    container_name: api-jmv-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # CONSUL
  # =====================================================
  consul:
    image: consul:1.15
    container_name: api-jmv-consul
    command: agent -dev -client=0.0.0.0
    ports:
      - "8500:8500"
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # VAULT
  # =====================================================
  vault:
    image: hashicorp/vault:1.15
    container_name: api-jmv-vault
    ports:
      - "8200:8200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add:
      - IPC_LOCK
    command: vault server -dev
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # ELASTICSEARCH
  # =====================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.3
    container_name: api-jmv-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      xpack.ml.enabled: "false"
      ingest.geoip.downloader.enabled: "false"
      ES_JAVA_OPTS: "-Xms256m -Xmx256m"
    ports:
      - "9200:9200"
    volumes:
      - elastic_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200 >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 20
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # LOGSTASH
  # =====================================================
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.3
    container_name: api-jmv-logstash
    environment:
      LS_JAVA_OPTS: "-Xms128m -Xmx128m"
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./elk/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # KIBANA
  # =====================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.3
    container_name: api-jmv-kibana
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      NODE_OPTIONS: "--max-old-space-size=768"
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_started
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # PROMETHEUS
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: api-jmv-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      - api
    networks:
      - api_jmv_network
    restart: unless-stopped

  # =====================================================
  # GRAFANA
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: api-jmv-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - api_jmv_network
    restart: unless-stopped

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
  redis_data:
  kafka_data:
  elastic_data:
  prometheus_data:
  grafana_data:

# =====================================================
# NETWORK
# =====================================================
networks:
  api_jmv_network:
    driver: bridge
