version: "3.9"

services:
  api:
    # -----------------------------------------------------
    # Servicio principal de FastAPI
    # -----------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: api-jmv-api

    ports:
      - "8000:8000"

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      REDIS_URL: redis://redis:6379/0

      # -----------------------------------------------------
      # Celery
      # -----------------------------------------------------
      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

      # -----------------------------------------------------
      # Kafka
      # -----------------------------------------------------
      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: api-jmv
      KAFKA_EVENTS_TOPIC: jmv.domain-events

      # -----------------------------------------------------
      # Consul
      # -----------------------------------------------------
      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      SERVICE_NAME: api-jmv
      SERVICE_HOST: api-jmv-api
      SERVICE_PORT: 8000
      SERVICE_TAGS: api,fastapi,jmv

      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000

      EXTERNAL_HTTP_TIMEOUT_SECONDS: 3
      EXTERNAL_CACHE_TTL_SECONDS: 300
      RESILIENCE_MOCK_BASE_URL: http://api:8000/api/v1/admin/resilience/mock-external

      # -----------------------------------------------------
      # Vault
      # -----------------------------------------------------
      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      rabbitmq:
        condition: service_started
      vault:
        condition: service_started

    networks:
      - api_jmv_network

    restart: unless-stopped

  projection-consumer:
    # -----------------------------------------------------
    # Consumer CQRS
    # -----------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: api-jmv-projection-consumer

    command: python -m app.consumers.items_projection_consumer

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      KAFKA_ENABLED: "true"
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_CLIENT_ID: api-jmv-projection-consumer
      KAFKA_EVENTS_TOPIC: jmv.domain-events

      # -----------------------------------------------------
      # Consul
      # -----------------------------------------------------
      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      EXTERNAL_HTTP_TIMEOUT_SECONDS: 3
      EXTERNAL_CACHE_TTL_SECONDS: 300
      RESILIENCE_MOCK_BASE_URL: http://api:8000/api/v1/admin/resilience/mock-external

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      vault:
        condition: service_started

    networks:
      - api_jmv_network

    restart: unless-stopped

  celery-worker:
    # -----------------------------------------------------
    # Worker Celery para tareas asíncronas y rotación
    # -----------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: api-jmv-celery-worker

    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      # -----------------------------------------------------
      # Consul
      # -----------------------------------------------------
      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      vault:
        condition: service_started

    networks:
      - api_jmv_network

    restart: unless-stopped

  celery-beat:
    # -----------------------------------------------------
    # Beat Celery para agendar la rotación cada 24h
    # -----------------------------------------------------
    build:
      context: .
      dockerfile: Dockerfile
      target: production

    container_name: api-jmv-celery-beat

    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "true"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1

      # -----------------------------------------------------
      # Consul
      # -----------------------------------------------------
      CONSUL_ENABLED: "false"
      CONSUL_HOST: consul
      CONSUL_PORT: 8500

      VAULT_ADDR: http://vault:8200
      VAULT_TOKEN: root

    depends_on:
      redis:
        condition: service_healthy
      vault:
        condition: service_started

    networks:
      - api_jmv_network

    restart: unless-stopped

  db:
    # -----------------------------------------------------
    # PostgreSQL
    # -----------------------------------------------------
    image: postgres:15

    container_name: api-jmv-db

    environment:
      POSTGRES_DB: api_jmv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_jmv"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - api_jmv_network

    restart: unless-stopped

  redis:
    # -----------------------------------------------------
    # Redis
    # -----------------------------------------------------
    image: redis:7-alpine

    container_name: api-jmv-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - api_jmv_network

    restart: unless-stopped

  gateway:
    # -----------------------------------------------------
    # API Gateway (NGINX)
    # -----------------------------------------------------
    image: nginx:alpine

    container_name: api-jmv-gateway

    ports:
      - "80:80"

    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - api

    networks:
      - api_jmv_network

    restart: unless-stopped

  rabbitmq:
    # -----------------------------------------------------
    # RabbitMQ
    # -----------------------------------------------------
    image: rabbitmq:3-management

    container_name: api-jmv-rabbitmq

    ports:
      - "5672:5672"
      - "15672:15672"

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    networks:
      - api_jmv_network

    restart: unless-stopped

  kafka:
    # -----------------------------------------------------
    # Apache Kafka
    # -----------------------------------------------------
    image: apache/kafka:3.9.2

    container_name: api-jmv-kafka

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3

    volumes:
      - kafka_data:/var/lib/kafka/data

    networks:
      - api_jmv_network

    restart: unless-stopped

  consul:
    # -----------------------------------------------------
    # Consul Service Discovery
    # -----------------------------------------------------
    image: consul:1.15

    container_name: api-jmv-consul

    command: agent -dev -client=0.0.0.0

    ports:
      - "8500:8500"

    networks:
      - api_jmv_network

    restart: unless-stopped

  vault:
    # -----------------------------------------------------
    # HashiCorp Vault
    # -----------------------------------------------------
    image: hashicorp/vault:1.15

    container_name: api-jmv-vault

    ports:
      - "8200:8200"

    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200

    cap_add:
      - IPC_LOCK

    command: vault server -dev

    networks:
      - api_jmv_network

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  api_jmv_network:
    driver: bridge
