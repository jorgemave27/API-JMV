# =====================================================
# DOCKER COMPOSE COMPLETO - API-JMV + AUTH SERVICE
# =====================================================

version: "3.9"

services:
  # =====================================================
  # API PRINCIPAL (ITEMS SERVICE)
  # =====================================================
  api:
    image: ghcr.io/jorgemave27/api-jmv:latest
    container_name: api-jmv-api

    entrypoint:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]

    ports:
      - "8000:8000"

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv

      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      REDIS_URL: redis://redis:6379/0

      CELERY_ENABLED: "false"
      KAFKA_ENABLED: "false"
      CONSUL_ENABLED: "false"

      SERVICE_NAME: api-jmv
      SERVICE_HOST: api-jmv-api
      SERVICE_PORT: 8000

      PROMETHEUS_ENABLED: "true"

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # AUTH SERVICE 🔥 NUEVO
  # =====================================================
  auth-service:
    build: ./auth-service
    container_name: api-jmv-auth

    ports:
      - "8001:8001"

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://auth_user:auth_pass@auth-db:5432/auth_db

      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      REDIS_URL: redis://redis:6379/0

    depends_on:
      - auth-db
      - redis

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # DB PRINCIPAL
  # =====================================================
  db:
    image: postgres:15
    container_name: api-jmv-db

    environment:
      POSTGRES_DB: api_jmv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_jmv"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # AUTH DB 🔥 NUEVA
  # =====================================================
  auth-db:
    image: postgres:15
    container_name: api-jmv-auth-db

    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass

    ports:
      - "5433:5432"

    volumes:
      - auth_postgres_data:/var/lib/postgresql/data

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # REDIS
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: api-jmv-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # NGINX GATEWAY 🔥
  # =====================================================
  gateway:
    image: nginx:alpine
    container_name: api-jmv-gateway

    ports:
      - "80:80"

    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      - api
      - auth-service

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # PROMETHEUS
  # =====================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: api-jmv-prometheus

    ports:
      - "9090:9090"

    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # GRAFANA
  # =====================================================
  grafana:
    image: grafana/grafana:latest
    container_name: api-jmv-grafana

    ports:
      - "3000:3000"

    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin

    volumes:
      - grafana_data:/var/lib/grafana

    networks:
      - api_jmv_network

    restart: unless-stopped

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  auth_postgres_data:

# =====================================================
# NETWORK
# =====================================================
networks:
  api_jmv_network:
    driver: bridge
