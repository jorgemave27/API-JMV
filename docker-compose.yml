version: "3.9"

services:
  # =====================================================
  # API PRINCIPAL
  # =====================================================
  api:
    build: .
    container_name: api-jmv-api
    working_dir: /app

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000

    ports:
      - "8000:8000"

    volumes:
      - ./:/app

    environment:
      APP_ENV: production

      DATABASE_URL: postgresql://postgres:postgres@db:5432/api_jmv
      API_KEY: dev-secret-key-change-me
      JWT_SECRET_KEY: super-secret-key-change-me-in-production
      SECRET_KEY: super-secret-key-change-me-in-production

      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7

      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200

      # 🔥 S3 / MINIO
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: api-jmv
      S3_REGION: us-east-1

      # 🔥 DESACTIVAR COSAS QUE ROMPEN TESTS
      CELERY_ENABLED: "false"
      KAFKA_ENABLED: "false"
      CONSUL_ENABLED: "false"

      # 🔥 IMPORTANTE: evita crash de sentry
      SENTRY_DSN: ""

      SERVICE_NAME: api-jmv
      SERVICE_HOST: api-jmv-api
      SERVICE_PORT: 8000

      PROMETHEUS_ENABLED: "true"

      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/

    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # MINIO
  # =====================================================
  minio:
    image: minio/minio:latest
    container_name: api-jmv-minio
    command: server /data --console-address ":9001"

    ports:
      - "9000:9000"
      - "9001:9001"

    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

    volumes:
      - minio_data:/data

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # DB
  # =====================================================
  db:
    image: postgres:15
    container_name: api-jmv-db

    environment:
      POSTGRES_DB: api_jmv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_jmv"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - api_jmv_network

    restart: unless-stopped

  # =====================================================
  # REDIS
  # =====================================================
  redis:
    image: redis:7-alpine
    container_name: api-jmv-redis

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - api_jmv_network

    restart: unless-stopped

# =====================================================
# VOLUMES
# =====================================================
volumes:
  postgres_data:
  redis_data:
  minio_data:

# =====================================================
# NETWORK
# =====================================================
networks:
  api_jmv_network:
    driver: bridge
